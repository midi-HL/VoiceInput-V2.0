name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/VoiceInput -r win-x64

      - name: Remove .NET 10 RID graph
        shell: pwsh
        run: |
          $dotnetRoot = "C:\Program Files\dotnet"
          Get-ChildItem "$dotnetRoot\sdk" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            $ridGraph = Join-Path $_.FullName "RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph) {
              Remove-Item -Force $ridGraph -ErrorAction SilentlyContinue
            }
          }
        continue-on-error: true

      - name: Build and capture XAML errors
        shell: pwsh
        run: |
          dotnet publish src/VoiceInput -c Release -r win-x64 --self-contained true --no-restore -o build-verify 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed. Running XamlCompiler directly..."
            $xamlCompiler = "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.4.240802001\tools\net472\XamlCompiler.exe"
            $inputJson = "src\VoiceInput\obj\Release\net8.0-windows10.0.19041.0\win-x64\input.json"
            $outputJson = "src\VoiceInput\obj\Release\net8.0-windows10.0.19041.0\win-x64\output.json"
            if (Test-Path $xamlCompiler) {
              Write-Host "Running: $xamlCompiler $inputJson $outputJson"
              & $xamlCompiler $inputJson $outputJson 2>&1
              Write-Host "Exit code: $LASTEXITCODE"
            } else {
              Write-Host "XamlCompiler not found at: $xamlCompiler"
            }
            if (Test-Path $outputJson) {
              Write-Host "=== output.json ==="
              Get-Content $outputJson
            }
            exit 1
          }

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          "C:\Program Files\dotnet\dotnet.exe" publish src\VoiceInput -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
