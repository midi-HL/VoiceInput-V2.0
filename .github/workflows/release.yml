name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove .NET 10 runtime
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet --list-runtimes | Where-Object { $_ -match '10\.0\.' } | ForEach-Object {
            $parts = $_ -split ' '
            $version = $parts[1]
            Write-Host "Removing .NET runtime $version"
            & dotnet --list-runtimes | Out-Null
          }
          # Remove .NET 10 SDK and runtime directories
          $dotnetRoot = $env:DOTNET_ROOT
          if (Test-Path "$dotnetRoot\shared\Microsoft.NETCore.App\10.0.9") {
            Remove-Item -Recurse -Force "$dotnetRoot\shared\Microsoft.NETCore.App\10.0.9" -ErrorAction SilentlyContinue
          }
          Get-ChildItem "$dotnetRoot\shared\Microsoft.NETCore.App" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            Write-Host "Removing $($_.FullName)"
            Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue
          }
          Get-ChildItem "$dotnetRoot\sdk" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            Write-Host "Removing SDK $($_.FullName)"
            Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue
          }

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish src/VoiceInput/VoiceInput.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Build verification
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          dotnet publish src/VoiceInput/VoiceInput.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./build-verify

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
