name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set .NET 8 RID graph path
        shell: pwsh
        run: |
          # Find .NET 8 SDK's RuntimeIdentifierGraph.json
          $sdkPath = & dotnet --list-sdk | Where-Object { $_ -match '8\.0\.' } | Select-Object -First 1 | ForEach-Object { $_.Split()[0] }
          $ridGraphPath = Join-Path $env:DOTNET_ROOT "sdk" $sdkPath "RuntimeIdentifierGraph.json"
          if (Test-Path $ridGraphPath) {
            Write-Host "Found RID graph: $ridGraphPath"
            echo "DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH=$ridGraphPath" >> $env:GITHUB_ENV
          } else {
            Write-Host "RID graph not found at: $ridGraphPath"
            # Try alternative location
            $altPath = Join-Path $env:DOTNET_ROOT "sdk" $sdkPath "Microsoft.NETCore.App.Ref" "RuntimeIdentifierGraph.json"
            if (Test-Path $altPath) {
              Write-Host "Found RID graph at: $altPath"
              echo "DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH=$altPath" >> $env:GITHUB_ENV
            }
          }

      - name: Restore
        run: dotnet restore src/VoiceInput

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish src/VoiceInput --configuration Release --output publish --self-contained true --runtime win-x64 --verbosity minimal /p:Version=1.0.0

      - name: Build verification
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: dotnet publish src/VoiceInput --configuration Release --output build-verify --self-contained true --runtime win-x64 --verbosity minimal

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
