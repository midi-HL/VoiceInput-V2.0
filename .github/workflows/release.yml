name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/VoiceInput -r win-x64

      - name: Remove .NET 10 RID graph
        shell: pwsh
        run: |
          $dotnetRoot = "C:\Program Files\dotnet"
          Get-ChildItem "$dotnetRoot\sdk" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            $ridGraph = Join-Path $_.FullName "RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph) {
              Remove-Item -Force $ridGraph -ErrorAction SilentlyContinue
            }
          }
        continue-on-error: true

      - name: Build with full output
        shell: pwsh
        run: |
          $output = dotnet publish src/VoiceInput -c Release -r win-x64 --self-contained true --no-restore -o build-verify 2>&1
          $output | Out-File -FilePath build-output.txt -Encoding utf8
          Write-Host "=== BUILD OUTPUT ==="
          $output | Where-Object { $_ -match "error|warning|MC[0-9]|XamlCompiler|Pass|Compile|Xaml" } | ForEach-Object { Write-Host $_ }
          Write-Host "=== END ==="
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed with exit code $LASTEXITCODE"
            # Try running XamlCompiler directly to get error
            $inputJson = "src/VoiceInput/obj/Release/net8.0-windows10.0.19041.0/win-x64/input.json"
            if (Test-Path $inputJson) {
              Write-Host "=== input.json ==="
              Get-Content $inputJson | ConvertFrom-Json | ConvertTo-Json -Depth 10
            }
            exit 1
          }

      - name: Upload build output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          "C:\Program Files\dotnet\dotnet.exe" publish src\VoiceInput -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
