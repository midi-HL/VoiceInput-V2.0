name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/VoiceInput -r win-x64

      - name: Remove WindowsAppSDK RID graph
        shell: pwsh
        run: |
          # Find and remove WindowsAppSDK's RuntimeIdentifierGraph.json
          $nugetPath = "$env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk"
          Get-ChildItem $nugetPath -Directory | ForEach-Object {
            $ridGraph = Join-Path $_.FullName "buildTransitive\RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph) {
              Write-Host "Removing: $ridGraph"
              Remove-Item -Force $ridGraph -ErrorAction SilentlyContinue
            }
            # Also check build directory
            $ridGraph2 = Join-Path $_.FullName "build\RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph2) {
              Write-Host "Removing: $ridGraph2"
              Remove-Item -Force $ridGraph2 -ErrorAction SilentlyContinue
            }
          }
          # Also remove from .NET 10 SDK
          $dotnetRoot = "C:\Program Files\dotnet"
          Get-ChildItem "$dotnetRoot\shared\Microsoft.NETCore.App" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            $ridGraph = Join-Path $_.FullName "RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph) {
              Write-Host "Removing: $ridGraph"
              Remove-Item -Force $ridGraph -ErrorAction SilentlyContinue
            }
          }
          Get-ChildItem "$dotnetRoot\sdk" -Directory | Where-Object { $_.Name -match '^10\.' } | ForEach-Object {
            $ridGraph = Join-Path $_.FullName "RuntimeIdentifierGraph.json"
            if (Test-Path $ridGraph) {
              Write-Host "Removing: $ridGraph"
              Remove-Item -Force $ridGraph -ErrorAction SilentlyContinue
            }
          }
        continue-on-error: true

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          "C:\Program Files\dotnet\dotnet.exe" publish src\VoiceInput -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Build verification
        if: "!startsWith(github.ref, 'refs/tags/v')"
        shell: cmd
        run: |
          "C:\Program Files\dotnet\dotnet.exe" publish src\VoiceInput -c Release -r win-x64 --self-contained true --no-restore -o build-verify

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
