name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $sdkPath = & dotnet --list-sdk | Where-Object { $_ -match '8\.0\.' } | Select-Object -First 1 | ForEach-Object { $_.Split()[0] }
          $ridGraph = Join-Path $env:DOTNET_ROOT "sdk" $sdkPath "RuntimeIdentifierGraph.json"
          $env:DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH = $ridGraph
          dotnet publish src/VoiceInput/VoiceInput.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Build verification
        if: "!startsWith(github.ref, 'refs/tags/v')"
        shell: pwsh
        run: |
          $sdkPath = & dotnet --list-sdk | Where-Object { $_ -match '8\.0\.' } | Select-Object -First 1 | ForEach-Object { $_.Split()[0] }
          $ridGraph = Join-Path $env:DOTNET_ROOT "sdk" $sdkPath "RuntimeIdentifierGraph.json"
          $env:DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH = $ridGraph
          dotnet publish src/VoiceInput/VoiceInput.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./build-verify

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
