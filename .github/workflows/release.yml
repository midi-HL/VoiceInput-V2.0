name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set .NET 8 SDK RID graph
        shell: pwsh
        run: |
          $sdkVersion = (dotnet --list-sdk | Where-Object { $_ -match '8\.0\.' } | Select-Object -First 1) -replace '\s.*',''
          $ridGraphPath = Join-Path $env:DOTNET_ROOT "sdk" $sdkVersion "RuntimeIdentifierGraph.json"
          if (Test-Path $ridGraphPath) {
            echo "DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH=$ridGraphPath" >> $env:GITHUB_ENV
            Write-Host "Using RID graph: $ridGraphPath"
          } else {
            Write-Host "RID graph not found at $ridGraphPath"
            # Try alternative path
            $altPath = Join-Path $env:DOTNET_ROOT "sdk" $sdkVersion "Sdks" "Microsoft.NET.Sdk" "targets" "RuntimeIdentifierGraph.json"
            if (Test-Path $altPath) {
              echo "DOTNET_RUNTIME_IDENTIFIER_GRAPH_PATH=$altPath" >> $env:GITHUB_ENV
              Write-Host "Using alternative RID graph: $altPath"
            }
          }

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish src/VoiceInput `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Build verification
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          dotnet publish src/VoiceInput `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./build-verify

      - name: Package portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Compress-Archive -Path ./publish/* -DestinationPath ./dist/VoiceInput-portable-win-x64.zip

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $hash = (Get-FileHash ./dist/VoiceInput-portable-win-x64.zip -Algorithm SHA256).Hash
          "$hash  VoiceInput-portable-win-x64.zip" | Out-File ./dist/checksums.txt
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/VoiceInput-portable-win-x64.zip
            ./dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
